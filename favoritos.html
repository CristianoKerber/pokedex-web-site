<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos — Missingmon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }


        .nav-hover-btn .nav-label,
        .login-header-btn .nav-label {
            color: #50a0ff;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .nav-hover-btn:hover .nav-label,
        .login-header-btn:hover .nav-label {
            color: #f8c200;
            text-shadow:
                0 0 6px rgba(248,194,0,0.8),
                0 0 14px rgba(248,194,0,0.5);
        }

        .login-header-btn #navLoginLabel {
            color: #50a0ff;
        }
        .login-header-btn:hover #navLoginLabel {
            color: #f8c200;
            text-shadow:
                0 0 6px rgba(248,194,0,0.8),
                0 0 14px rgba(248,194,0,0.5);
        }

        .login-header-btn:hover .lhi-user circle,
        .login-header-btn:hover .lhi-user path {
            fill: #f8c200;
        }
        .lhi-user circle,
        .lhi-user path {
            transition: fill 0.2s ease;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .battle-scene {
            flex: 1;
            position: relative;
            background: linear-gradient(
                to bottom,
                #c8e8f0 0%,
                #c8e8f0 55%,
                #a8c890 55%,
                #a8c890 100%
            );
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .battle-scene::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent, transparent 3px,
                rgba(255,255,255,0.05) 3px, rgba(255,255,255,0.05) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        .platform-center {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 65px;
            background: radial-gradient(ellipse, #b8d890 55%, transparent 100%);
            border-radius: 50%;
            opacity: 0.85;
            z-index: 1;
        }

        .pokemon-center {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .pokemon-center img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(2px 6px 10px rgba(0,0,0,0.35));
        }
        .pokemon-center.saindo {
            opacity: 0;
            transform: translateX(50px);
        }
        .pokemon-center.entrando {
            opacity: 0;
            transform: translateX(-50px);
        }

        .status-enemy {
            position: absolute;
            top: 12px;
            left: 16px;
            background: #f0ead8;
            border: 3px solid #333;
            border-radius: 8px 8px 8px 0;
            padding: 8px 14px 10px;
            min-width: 210px;
            box-shadow: 3px 3px 0 #333;
            z-index: 3;

        }
        .status-enemy-inner {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .poke-name  { font-size: 14px; font-weight: 900; color: #111; letter-spacing: 0.05em; }


        .btn-desfav {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            transition: transform 0.15s;
        }
        .btn-desfav:hover { transform: scale(1.2); }
        .btn-desfav img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            background: none !important;
            border-radius: 0 !important;
            padding: 0 !important;
            filter: sepia(1) saturate(6) hue-rotate(5deg) brightness(1.1);
            transition: filter 0.2s;
        }
        .btn-desfav.removido img {
            filter: brightness(0) invert(1);
        }
        .poke-level { font-size: 12px; font-weight: 700; color: #333; }
        .hp-row { display: flex; align-items: center; gap: 6px; }
        .hp-label {
            font-size: 10px; font-weight: 900; color: #e6a800;
            background: #333; padding: 1px 5px; border-radius: 3px;
        }
        .hp-track {
            flex: 1; height: 8px; background: #555;
            border-radius: 4px; overflow: hidden; border: 1px solid #333;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(to right, #30d860, #28c050);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 22px;
            font-weight: 900;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: background 0.15s;
        }
        .carousel-btn:hover { background: rgba(230,168,0,0.75); }
        .carousel-btn.prev  { left: 12px; }
        .carousel-btn.next  { right: 12px; }

        .poke-dots {
            position: absolute;
            top: 12px;
            right: 16px;
            display: flex;
            gap: 6px;
            z-index: 4;
        }
        .poke-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            border: 1.5px solid rgba(255,255,255,0.6);
            cursor: pointer;
            transition: background 0.2s;
        }
        .poke-dot.active { background: #f8c200; border-color: #e6a800; }

        .stats-bottom {
            position: relative;
            background: #1a3a5c;
            border-top: 4px solid #e6a800;
            flex-shrink: 0;
            display: flex;
            align-items: stretch;
            min-height: 110px;
        }
        .stats-bottom::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 3px solid #c8a030;
            border-top: none;
            pointer-events: none;
            z-index: 0;
        }

        .dialog-text {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: white;
            line-height: 1.7;
            padding: 14px 20px;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
        }
        .dialog-text span { color: #f8c200; }

        .stat-card-vertical {
            background: #f0ead8;
            border: 3px solid #333;
            border-bottom: none;
            border-right: none;
            border-radius: 12px 0 0 0;
            box-shadow: -3px -3px 0 #333;
            padding: 12px 20px 14px;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            z-index: 1;
        }

        .stat-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stat-nav button {
            background: #333;
            border: none;
            color: #e6a800;
            font-size: 14px;
            font-weight: 900;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .stat-nav button:hover { background: #555; }

        .stat-label-name {
            font-size: 11px;
            font-weight: 900;
            color: #555;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
        }
        .stat-value-big {
            font-size: 26px;
            font-weight: 900;
            color: #111;
            text-align: center;
            line-height: 1;
        }
        .stat-bar-track {
            height: 10px;
            background: #555;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .stat-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.6s ease;
        }
        .stat-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .stat-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #bbb;
            border: 1px solid #888;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stat-dot.active { background: #e6a800; border-color: #a07000; }

        .nav-hover-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .nav-hover-btn:hover { background: rgba(230,168,0,0.10); }

        .nav-hover-icon { display: block; overflow: visible; }
        .nav-hover-g { transition: transform 0.2s ease; transform-origin: center bottom; }
        .nav-hover-btn:hover .nav-hover-g {
            animation: navIconFloat 1.4s ease-in-out infinite;
        }
        @keyframes navIconFloat {
            0%   { transform: translateY(0px);  }
            35%  { transform: translateY(-6px); }
            65%  { transform: translateY(-6px); }
            100% { transform: translateY(0px);  }
        }

        .nav-hover-icon image,
        .nav-hover-icon img {
            background: none !important;
            border-radius: 0 !important;
            padding: 0 !important;
        }

        .poke-types {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        .poke-types img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }
    </style>
</head>
<body>

<div class="header-sticky">
<header>
    <img src="img/pokedex-logo.png" alt="Logo Missingmon" class="header-logo">

    <nav class="header-nav">
        
        <a href="index.html" style="text-decoration:none;">
            <button class="nav-hover-btn">
                <svg class="nav-hover-icon" width="36" height="36" viewBox="0 0 36 36"
                    xmlns="http://www.w3.org/2000/svg">
                    <g class="nav-hover-g">
                        <image href="img/home-icon.png" x="-8" y="-8" width="52" height="52"
                            style="image-rendering:pixelated"/>
                    </g>
                </svg>
                <span class="nav-label nav-label--yellow">Home</span>
            </button>
        </a>

        
        <button class="nav-hover-btn">
            <svg class="nav-hover-icon" width="36" height="36" viewBox="0 0 36 36"
                fill="none" xmlns="http://www.w3.org/2000/svg">
                <g class="nav-hover-g">
                    <image href="img/favorite-icon-button.png" x="4" y="4" width="28" height="28"
                        style="image-rendering:pixelated"/>
                </g>
            </svg>
            <span class="nav-label nav-label--yellow">Favoritos</span>
        </button>

        
        <button class="login-header-btn" id="navLoginBtn">
            <svg class="login-header-icon" width="36" height="36" viewBox="0 0 36 36"
                fill="none" xmlns="http://www.w3.org/2000/svg">
                <g class="lhi-user">
                    <circle cx="18" cy="13" r="6" fill="#9b6ec8"/>
                    <path d="M6 32c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="#9b6ec8"/>
                </g>
            </svg>
            <span id="navLoginLabel" class="nav-label nav-label--purple">Login</span>
        </button>
    </nav>
</header>
</div>

<div class="battle-scene" id="battleScene">

    <div class="platform-center"></div>

    
    <div class="pokemon-center" id="pokemonCenter">
        <img id="pokemonImg" src="" alt="">
    </div>

    
    <div class="status-enemy" id="statusEnemy">
        <div class="status-enemy-inner">
            <span class="poke-name" id="pokeName">---</span>
            <button class="btn-desfav" id="btnDesfav" title="Remover dos favoritos">
                <img src="img/favorite-icon-button.png" alt="Favorito">
            </button>
        </div>
        <div class="poke-types" id="pokeTypes"></div>
    </div>

    
    <button class="carousel-btn prev" onclick="pokeAnterior()">&#9664;</button>
    <button class="carousel-btn next" onclick="pokeProximo()">&#9654;</button>

    
    <div class="poke-dots" id="pokeDots"></div>

</div>

<div class="stats-bottom">
    <div class="dialog-text" id="dialogText">Escolha um pokémon!</div>

    <div class="stat-card-vertical">
        <div class="stat-nav">
            <button onclick="statAnterior()">&#9664;</button>
            <span class="stat-label-name" id="statLabel">HP</span>
            <button onclick="statProximo()">&#9654;</button>
        </div>
        <div class="stat-value-big" id="statValue">---</div>
        <div class="stat-bar-track">
            <div class="stat-bar-fill" id="statBar" style="width:0%"></div>
        </div>
        <div class="stat-dots" id="statDots"></div>
    </div>
</div>

<script>
// ── Constantes ─────────────────────────────────────────────────────
const TIPO_ICONE = {
    grass:"img/Grama.webp",    poison:"img/Veneno.webp",   fire:"img/Fogo.webp",
    flying:"img/Voador.webp",  water:"img/Agua.webp",      bug:"img/Inseto.webp",
    normal:"img/Normal.webp",  electric:"img/Eletrico.webp",ground:"img/Terra.webp",
    fairy:"img/Fada.webp",     fighting:"img/Lutador.webp", psychic:"img/Psiquico.webp",
    rock:"img/Pedra.webp",     ghost:"img/Fantasma.webp",  ice:"img/Gelo.webp",
    dragon:"img/Dragao.webp",  dark:"img/Sombrio.webp",    steel:"img/Aco.webp",
};

const TIPO_CLASSE = {
    grass:"grama", poison:"veneno", fire:"fogo", flying:"voador", water:"agua",
    bug:"inseto", normal:"normal", electric:"eletrico", ground:"terra", fairy:"fada",
    fighting:"lutador", psychic:"psiquico", rock:"pedra", ghost:"fantasma",
    ice:"gelo", dragon:"dragao", dark:"sombrio", steel:"aco",
};

const STATS = [
    { label: "HP",       key: "hp",       cor: "#30d860" },
    { label: "ATTACK",   key: "attack",   cor: "#f04040" },
    { label: "DEFENSE",  key: "defense",  cor: "#f04040" },
    { label: "SP. ATK",  key: "spAtk",    cor: "#78d050" },
    { label: "SP. DEF",  key: "spDef",    cor: "#f04040" },
    { label: "SPEED",    key: "speed",    cor: "#f8d030" },
];

const MSGS = [
    p => `<span>${p.name.toUpperCase()}</span>&nbsp;quer batalhar!`,
    p => `Um&nbsp;<span>${p.name.toUpperCase()}</span>&nbsp;selvagem apareceu!`,
    p => `<span>${p.name.toUpperCase()}</span>&nbsp;está pronto para lutar!`,
];

const GRADIENTES = {
    "normal":"radial-gradient(circle at top, white, gray)",
    "fogo":"radial-gradient(circle at top, khaki, orangered)",
    "agua":"radial-gradient(circle at top, rgb(122,176,228), rgb(5,91,172))",
    "grama":"radial-gradient(circle at top, limegreen, seagreen)",
    "eletrico":"radial-gradient(circle at top, khaki, orange)",
    "gelo":"radial-gradient(circle at top, aliceblue, lightskyblue)",
    "lutador":"radial-gradient(circle at top, tomato, darkred)",
    "veneno":"radial-gradient(circle at top, plum, purple)",
    "terra":"radial-gradient(circle at top, chocolate, sienna)",
    "voador":"radial-gradient(circle at top, paleturquoise, steelblue)",
    "psiquico":"radial-gradient(circle at top, lightsalmon, palevioletred)",
    "inseto":"radial-gradient(circle at top, lawngreen, olivedrab)",
    "pedra":"radial-gradient(circle at top, lemonchiffon, brown)",
    "fada":"radial-gradient(circle at top, lightpink, fuchsia)",
    "fantasma":"radial-gradient(circle at top, orchid, indigo)",
    "dragao":"radial-gradient(circle at top, royalblue, darkblue)",
    "sombrio":"radial-gradient(circle at top, slategray, #1a1a2e)",
    "aco":"radial-gradient(circle at top, lightsteelblue, steelblue)",
    "grama-veneno":"linear-gradient(to right, limegreen, purple)",
    "fogo-voador":"linear-gradient(to right, orangered, paleturquoise)",
    "inseto-voador":"linear-gradient(to right, olivedrab, paleturquoise)",
    "inseto-veneno":"linear-gradient(to right, olivedrab, purple)",
    "normal-voador":"linear-gradient(to right, gray, paleturquoise)",
    "veneno-terra":"linear-gradient(to right, purple, chocolate)",
    "fada-normal":"linear-gradient(to right, gray, lightpink)",
    "normal-fada":"linear-gradient(to right, gray, lightpink)",
    "veneno-voador":"linear-gradient(to right, purple, paleturquoise)",
    "inseto-grama":"linear-gradient(to right, olivedrab, limegreen)",
};

let pokemons = [];
let pokeAtual = 0;
let statAtual = 0;

// ── Lê salvos do usuário logado ────────────────────────────────────
function getSalvos() {
    const logado   = localStorage.getItem("missingmon_logado");
    const usuarios = JSON.parse(localStorage.getItem("missingmon_usuarios") || "{}");
    if (!logado || !usuarios[logado]) return [];
    return usuarios[logado].salvos || [];
}

// ── Busca dados de um pokémon pela API ─────────────────────────────
async function buscarPokemon(id) {
    const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    const d = await r.json();
    const stats = {};
    d.stats.forEach(s => {
        const key = s.stat.name
            .replace("special-attack", "spAtk")
            .replace("special-defense", "spDef")
            .replace("-", "");
        stats[key] = s.base_stat;
    });
    return {
        id:      d.id,
        name:    d.name.charAt(0).toUpperCase() + d.name.slice(1),
        sprite:  d.sprites.front_default,
        tipos:   d.types.map(t => t.type.name),
        ...stats,
    };
}

// ── Calcula o gradiente baseado nos tipos ──────────────────────────
function gradienteDeTipos(tipos) {
    const classes = tipos.map(t => TIPO_CLASSE[t] || t);
    const chave   = classes.join("-");
    return GRADIENTES[chave] || GRADIENTES[classes[0]] || "radial-gradient(circle at top, #555, #222)";
}

// ── Inicializa ─────────────────────────────────────────────────────
async function init() {
    const salvos = getSalvos();

    if (salvos.length === 0) {
        // Sem favoritos: mostra mensagem
        document.getElementById("pokemonCenter").style.display = "none";
        document.getElementById("statusEnemy").style.display   = "none";
        document.querySelector(".carousel-btn.prev").style.display = "none";
        document.querySelector(".carousel-btn.next").style.display = "none";
        document.getElementById("dialogText").innerHTML =
            "Nenhum favorito salvo ainda.";
        document.getElementById("statValue").textContent = "--";
        return;
    }

    // Busca todos em paralelo
    pokemons = await Promise.all(salvos.map(id => buscarPokemon(id).catch(() => null)));
    pokemons = pokemons.filter(Boolean);

    if (pokemons.length > 0) renderTudo();
}

// ── Renderiza o pokémon atual ──────────────────────────────────────
function renderTudo() {
    const p = pokemons[pokeAtual];

    // Sprite
    document.getElementById("pokemonImg").src = p.sprite;
    document.getElementById("pokemonImg").alt = p.name;

    // Nome
    document.getElementById("pokeName").textContent = p.name.toUpperCase();

    // Botão desfavoritar
    const btnDesfav = document.getElementById("btnDesfav");
    btnDesfav.classList.remove("removido");
    btnDesfav.onclick = () => desfavoritar(p.id);

    // Tipos com ícones
    const tiposEl = document.getElementById("pokeTypes");
    tiposEl.innerHTML = "";
    p.tipos.forEach(t => {
        if (TIPO_ICONE[t]) {
            const img = document.createElement("img");
            img.src = TIPO_ICONE[t]; img.alt = t;
            tiposEl.appendChild(img);
        }
    });

    // Diálogo
    document.getElementById("dialogText").innerHTML = MSGS[pokeAtual % MSGS.length](p);

    // Gradiente da cena de batalha baseado no tipo
    document.querySelector(".battle-scene").style.background = gradienteDeTipos(p.tipos)
        .replace("linear-gradient(to right,", "linear-gradient(to bottom,")
        + ", " + "transparent";

    // Reset: fundo padrão (não sobrescreve o CSS, apenas tinge levemente)
    document.querySelector(".battle-scene").style.background = "";

    renderStat();
    renderDotsPoke();
    renderDotsStat();
}

function renderStat() {
    const p = pokemons[pokeAtual];
    const s = STATS[statAtual];
    const val = p[s.key] ?? "--";
    document.getElementById("statLabel").textContent    = s.label;
    document.getElementById("statValue").textContent    = val;
    document.getElementById("statBar").style.width      = `${((val || 0) / 255) * 100}%`;
    document.getElementById("statBar").style.background = s.cor;
    document.querySelectorAll(".stat-dot").forEach((d, i) =>
        d.classList.toggle("active", i === statAtual));
}

function renderDotsPoke() {
    const pd = document.getElementById("pokeDots");
    pd.innerHTML = "";
    pokemons.forEach((_, i) => {
        const d = document.createElement("div");
        d.classList.add("poke-dot");
        if (i === pokeAtual) d.classList.add("active");
        d.onclick = () => irPara(i);
        pd.appendChild(d);
    });
}

function renderDotsStat() {
    const sd = document.getElementById("statDots");
    sd.innerHTML = "";
    STATS.forEach((_, i) => {
        const d = document.createElement("div");
        d.classList.add("stat-dot");
        if (i === statAtual) d.classList.add("active");
        d.onclick = () => { statAtual = i; renderStat(); };
        sd.appendChild(d);
    });
}

// ── Navegação ──────────────────────────────────────────────────────
function irPara(i) {
    if (pokemons.length === 0) return;
    const el = document.getElementById("pokemonCenter");
    el.classList.add("saindo");
    setTimeout(() => {
        pokeAtual = i; statAtual = 0;
        el.classList.remove("saindo");
        el.classList.add("entrando");
        renderTudo();
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove("entrando")));
    }, 280);
}

function pokeProximo()  { irPara((pokeAtual + 1) % pokemons.length); }
function pokeAnterior() { irPara((pokeAtual - 1 + pokemons.length) % pokemons.length); }
function statProximo()  { statAtual = (statAtual + 1) % STATS.length; renderStat(); }
function statAnterior() { statAtual = (statAtual - 1 + STATS.length) % STATS.length; renderStat(); }

document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") pokeProximo();
    if (e.key === "ArrowLeft")  pokeAnterior();
    if (e.key === "ArrowUp")    statAnterior();
    if (e.key === "ArrowDown")  statProximo();
});

// ── Desfavorita e remove o pokémon da lista ───────────────────────
function desfavoritar(pokemonId) {
    const logado   = localStorage.getItem("missingmon_logado");
    const usuarios = JSON.parse(localStorage.getItem("missingmon_usuarios") || "{}");
    if (!logado || !usuarios[logado]) return;

    const salvos = usuarios[logado].salvos || [];
    const idx    = salvos.indexOf(pokemonId);
    if (idx === -1) return;

    // Marca visualmente como branco
    const btn = document.getElementById("btnDesfav");
    btn.classList.add("removido");

    // Remove do localStorage
    salvos.splice(idx, 1);
    usuarios[logado].salvos = salvos;
    localStorage.setItem("missingmon_usuarios", JSON.stringify(usuarios));

    // Remove do array local e navega para o próximo após animação
    setTimeout(() => {
        pokemons.splice(pokeAtual, 1);
        if (pokemons.length === 0) {
            // Sem favoritos restantes
            document.getElementById("pokemonCenter").style.display = "none";
            document.getElementById("statusEnemy").style.display   = "none";
            document.querySelector(".carousel-btn.prev").style.display = "none";
            document.querySelector(".carousel-btn.next").style.display = "none";
            document.getElementById("pokeDots").innerHTML = "";
            document.getElementById("dialogText").innerHTML =
                "Nenhum favorito salvo ainda.";
            document.getElementById("statValue").textContent = "--";
            document.getElementById("statBar").style.width  = "0%";
            document.getElementById("statDots").innerHTML   = "";
            return;
        }
        // Ajusta índice se necessário
        if (pokeAtual >= pokemons.length) pokeAtual = pokemons.length - 1;
        statAtual = 0;
        renderTudo();
    }, 400);
}

init();
</script>
