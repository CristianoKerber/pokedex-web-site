<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos — Missingmon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }


        .nav-hover-btn .nav-label,
        .login-header-btn .nav-label {
            color: #50a0ff;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .nav-hover-btn:hover .nav-label,
        .login-header-btn:hover .nav-label {
            color: #f8c200;
            text-shadow:
                0 0 6px rgba(248,194,0,0.8),
                0 0 14px rgba(248,194,0,0.5);
        }

        .login-header-btn #navLoginLabel {
            color: #50a0ff;
        }
        .login-header-btn:hover #navLoginLabel {
            color: #f8c200;
            text-shadow:
                0 0 6px rgba(248,194,0,0.8),
                0 0 14px rgba(248,194,0,0.5);
        }

        .login-header-btn:hover .lhi-user circle,
        .login-header-btn:hover .lhi-user path {
            fill: #f8c200;
        }
        .lhi-user circle,
        .lhi-user path {
            transition: fill 0.2s ease;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .battle-scene {
            flex: 1;
            position: relative;
            background: linear-gradient(
                to bottom,
                #c8e8f0 0%,
                #c8e8f0 55%,
                #a8c890 55%,
                #a8c890 100%
            );
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .battle-scene::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent, transparent 3px,
                rgba(255,255,255,0.05) 3px, rgba(255,255,255,0.05) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        .platform-center {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 65px;
            background: radial-gradient(ellipse, #b8d890 55%, transparent 100%);
            border-radius: 50%;
            opacity: 0.85;
            z-index: 1;
        }

        .pokemon-center {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .pokemon-center img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(2px 6px 10px rgba(0,0,0,0.35));
        }
        .pokemon-center.saindo {
            opacity: 0;
            transform: translateX(50px);
        }
        .pokemon-center.entrando {
            opacity: 0;
            transform: translateX(-50px);
        }

        .status-enemy {
            position: absolute;
            top: 12px;
            left: 16px;
            background: #f0ead8;
            border: 3px solid #333;
            border-radius: 8px 8px 8px 0;
            padding: 8px 14px 10px;
            min-width: 210px;
            box-shadow: 3px 3px 0 #333;
            z-index: 3;

        }
        .status-enemy-inner {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .poke-name  { font-size: 14px; font-weight: 900; color: #111; letter-spacing: 0.05em; }


        .btn-desfav {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            transition: transform 0.15s;
        }
        .btn-desfav:hover { transform: scale(1.2); }
        .btn-desfav img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            background: none !important;
            border-radius: 0 !important;
            padding: 0 !important;
            filter: sepia(1) saturate(6) hue-rotate(5deg) brightness(1.1);
            transition: filter 0.2s;
        }
        .btn-desfav.removido img {
            filter: brightness(0) invert(1);
        }
        .poke-level { font-size: 12px; font-weight: 700; color: #333; }
        .hp-row { display: flex; align-items: center; gap: 6px; }
        .hp-label {
            font-size: 10px; font-weight: 900; color: #e6a800;
            background: #333; padding: 1px 5px; border-radius: 3px;
        }
        .hp-track {
            flex: 1; height: 8px; background: #555;
            border-radius: 4px; overflow: hidden; border: 1px solid #333;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(to right, #30d860, #28c050);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 22px;
            font-weight: 900;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: background 0.15s;
        }
        .carousel-btn:hover { background: rgba(230,168,0,0.75); }
        .carousel-btn.prev  { left: 12px; }
        .carousel-btn.next  { right: 12px; }

        .poke-dots {
            position: absolute;
            top: 12px;
            right: 16px;
            display: flex;
            gap: 6px;
            z-index: 4;
        }
        .poke-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            border: 1.5px solid rgba(255,255,255,0.6);
            cursor: pointer;
            transition: background 0.2s;
        }
        .poke-dot.active { background: #f8c200; border-color: #e6a800; }

        .stats-bottom {
            position: relative;
            background: #1a3a5c;
            border-top: 4px solid #e6a800;
            flex-shrink: 0;
            display: flex;
            align-items: stretch;
            min-height: 110px;
        }
        .stats-bottom::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 3px solid #c8a030;
            border-top: none;
            pointer-events: none;
            z-index: 0;
        }

        .dialog-text {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: white;
            line-height: 1.7;
            padding: 14px 20px;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
        }
        .dialog-text span { color: #f8c200; }

        .stat-card-vertical {
            background: #f0ead8;
            border: 3px solid #333;
            border-bottom: none;
            border-right: none;
            border-radius: 12px 0 0 0;
            box-shadow: -3px -3px 0 #333;
            padding: 12px 20px 14px;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            z-index: 1;
        }

        .stat-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stat-nav button {
            background: #333;
            border: none;
            color: #e6a800;
            font-size: 14px;
            font-weight: 900;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .stat-nav button:hover { background: #555; }

        .stat-label-name {
            font-size: 11px;
            font-weight: 900;
            color: #555;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
        }
        .stat-value-big {
            font-size: 26px;
            font-weight: 900;
            color: #111;
            text-align: center;
            line-height: 1;
        }
        .stat-bar-track {
            height: 10px;
            background: #555;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .stat-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.6s ease;
        }
        .stat-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .stat-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #bbb;
            border: 1px solid #888;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stat-dot.active { background: #e6a800; border-color: #a07000; }

        .nav-hover-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .nav-hover-btn:hover { background: rgba(230,168,0,0.10); }

        .nav-hover-icon { display: block; overflow: visible; }
        .nav-hover-g { transition: transform 0.2s ease; transform-origin: center bottom; }
        .nav-hover-btn:hover .nav-hover-g {
            animation: navIconFloat 1.4s ease-in-out infinite;
        }
        @keyframes navIconFloat {
            0%   { transform: translateY(0px);  }
            35%  { transform: translateY(-6px); }
            65%  { transform: translateY(-6px); }
            100% { transform: translateY(0px);  }
        }

        .nav-hover-icon image,
        .nav-hover-icon img {
            background: none !important;
            border-radius: 0 !important;
            padding: 0 !important;
        }

        .poke-types {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        .poke-types img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

    @media (max-width: 720px) {
        .status-enemy { min-width: 160px; font-size: 12px; padding: 6px 10px 8px; }
        .poke-name     { font-size: 12px; }
        .pokemon-center img { width: 130px; height: 130px; }
        .stat-card-vertical { min-width: 160px; padding: 10px 14px 12px; }
        .stat-value-big     { font-size: 20px; }
        .dialog-text        { font-size: 13px; padding: 10px 14px; }
        .stats-bottom       { min-height: 88px; }
        .carousel-btn       { width: 32px; height: 32px; font-size: 18px; }
    }

    @media (max-width: 480px) {
        .status-enemy  { min-width: 130px; top: 8px; left: 8px; }
        .pokemon-center img { width: 100px; height: 100px; }
        .platform-center    { width: 160px; height: 40px; }
        .stat-card-vertical { min-width: 130px; padding: 8px 10px; }
        .stat-value-big     { font-size: 16px; }
        .stat-label-name    { font-size: 9px; }
        .dialog-text        { font-size: 11px; padding: 8px 10px; }
        .stats-bottom       { min-height: 76px; }
        .login-card         { width: 95vw; }
    }
    </style>
</head>
<body>

<div class="header-sticky">
<header>
    <img src="img/pokedex-logo.png" alt="Logo Missingmon" class="header-logo">

    <nav class="header-nav">
        
        <a href="index.html" style="text-decoration:none;">
            <button class="nav-hover-btn">
                <svg class="nav-hover-icon" width="36" height="36" viewBox="0 0 36 36"
                    xmlns="http://www.w3.org/2000/svg">
                    <g class="nav-hover-g">
                        <image href="img/home-icon.png" x="-8" y="-8" width="52" height="52"
                            style="image-rendering:pixelated"/>
                    </g>
                </svg>
                <span class="nav-label nav-label--yellow">Home</span>
            </button>
        </a>

        
        <button class="nav-hover-btn">
            <svg class="nav-hover-icon" width="36" height="36" viewBox="0 0 36 36"
                fill="none" xmlns="http://www.w3.org/2000/svg">
                <g class="nav-hover-g">
                    <image href="img/favorite-icon-button.png" x="4" y="4" width="28" height="28"
                        style="image-rendering:pixelated"/>
                </g>
            </svg>
            <span class="nav-label nav-label--yellow">Favoritos</span>
        </button>

        
        <button class="login-header-btn" id="navLoginBtn">
            <svg class="login-header-icon" width="36" height="36" viewBox="0 0 36 36"
                fill="none" xmlns="http://www.w3.org/2000/svg">
                <g class="lhi-user">
                    <circle cx="18" cy="13" r="6" fill="#9b6ec8"/>
                    <path d="M6 32c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="#9b6ec8"/>
                </g>
            </svg>
            <span id="navLoginLabel" class="nav-label nav-label--purple">Login</span>
        </button>
    </nav>
</header>
</div>

<div class="battle-scene" id="battleScene">

    <div class="platform-center"></div>

    
    <div class="pokemon-center" id="pokemonCenter">
        <img id="pokemonImg" src="" alt="">
    </div>

    
    <div class="status-enemy" id="statusEnemy">
        <div class="status-enemy-inner">
            <span class="poke-name" id="pokeName">---</span>
            <button class="btn-desfav" id="btnDesfav" title="Remover dos favoritos">
                <img src="img/favorite-icon-button.png" alt="Favorito">
            </button>
        </div>
        <div class="poke-types" id="pokeTypes"></div>
    </div>

    
    <button class="carousel-btn prev" onclick="pokeAnterior()">&#9664;</button>
    <button class="carousel-btn next" onclick="pokeProximo()">&#9654;</button>

    
    <div class="poke-dots" id="pokeDots"></div>

</div>

<div class="stats-bottom">
    <div class="dialog-text" id="dialogText">Escolha um pokémon!</div>

    <div class="stat-card-vertical">
        <div class="stat-nav">
            <button onclick="statAnterior()">&#9664;</button>
            <span class="stat-label-name" id="statLabel">HP</span>
            <button onclick="statProximo()">&#9654;</button>
        </div>
        <div class="stat-value-big" id="statValue">---</div>
        <div class="stat-bar-track">
            <div class="stat-bar-fill" id="statBar" style="width:0%"></div>
        </div>
        <div class="stat-dots" id="statDots"></div>
    </div>
</div>

<script src="favoritos.js"></script>
    
    <div class="login-overlay" id="overlayLogin">
        <div class="login-card">
            <div class="login-titlebar">
                <button class="login-titlebar-close" onclick="fecharLogin()">&#10005;</button>
                <span class="login-titlebar-title">Login</span>
            </div>
            <div class="login-body">
                <div class="login-avatar">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                        stroke="#1a4a8a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="7" r="4"/>
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    </svg>
                </div>
                <div class="login-fields">
                    <div class="login-field">
                        <span class="login-field-label">Usuário</span>
                        <input type="text" id="inputUser" placeholder="Digite seu usuário"
                            onkeydown="if(event.key==='Enter') fazerLogin()">
                    </div>
                </div>
                <p class="login-error" id="loginError"></p>
                <div class="login-buttons">
                    <button class="login-btn login-btn-primary" onclick="fazerLogin()">ENTRAR</button>
                    <button class="login-btn" onclick="abrirRegister()">REGISTRAR</button>
                </div>
            </div>
            <div class="login-gameboy-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    
    <div class="login-overlay" id="overlayRegister">
        <div class="login-card">
            <div class="login-titlebar">
                <button class="login-titlebar-close" onclick="fecharRegister()">&#10005;</button>
                <span class="login-titlebar-title">Cadastro</span>
            </div>
            <div class="login-body">
                <div class="login-avatar">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                        stroke="#1a4a8a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="7" r="4"/>
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    </svg>
                </div>
                <div class="login-fields">
                    <div class="login-field">
                        <span class="login-field-label">Nome</span>
                        <input type="text" id="regNome" placeholder="Seu nome completo">
                    </div>
                    <div class="login-field">
                        <span class="login-field-label">Usuário</span>
                        <input type="text" id="regUser" placeholder="Escolha um usuário">
                    </div>
                </div>
                <p class="login-error" id="registerError"></p>
                <div class="login-buttons">
                    <button class="login-btn login-btn-primary" onclick="fazerCadastro()">CRIAR</button>
                    <button class="login-btn" onclick="fecharRegister(); abrirLogin()">VOLTAR</button>
                </div>
            </div>
            <div class="login-gameboy-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
