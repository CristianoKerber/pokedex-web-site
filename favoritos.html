<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos — Missingmon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
        <link rel="stylesheet" href="favoritos.css">

</head>
<body>

<div class="header-sticky">
<header>
    <img src="img/pokedex-logo.png" alt="Logo Missingmon" class="header-logo">

    <nav class="header-nav">
        
        <a href="index.html" style="text-decoration:none;">
            <button class="nav-hover-btn">
                <svg class="nav-hover-icon" width="36" height="36" viewBox="0 0 36 36"
                    xmlns="http://www.w3.org/2000/svg">
                    <g class="nav-hover-g">
                        <image href="img/home-icon.png" x="-8" y="-8" width="52" height="52"
                            style="image-rendering:pixelated"/>
                    </g>
                </svg>
                <span class="nav-label nav-label--yellow">Home</span>
            </button>
        </a>

        
        <button class="nav-hover-btn">
            <svg class="nav-hover-icon" width="36" height="36" viewBox="0 0 36 36"
                fill="none" xmlns="http://www.w3.org/2000/svg">
                <g class="nav-hover-g">
                    <image href="img/favorite-icon-button.png" x="4" y="4" width="28" height="28"
                        style="image-rendering:pixelated"/>
                </g>
            </svg>
            <span class="nav-label nav-label--yellow">Favoritos</span>
        </button>

        
        <button class="login-header-btn" id="navLoginBtn">
            <svg class="login-header-icon" width="36" height="36" viewBox="0 0 36 36"
                fill="none" xmlns="http://www.w3.org/2000/svg">
                <g class="lhi-user">
                    <circle cx="18" cy="13" r="6" fill="#9b6ec8"/>
                    <path d="M6 32c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="#9b6ec8"/>
                </g>
            </svg>
            <span id="navLoginLabel" class="nav-label nav-label--purple">Login</span>
        </button>
    </nav>
</header>
</div>

<div class="battle-scene" id="battleScene">

    <div class="platform-center"></div>

    
    <div class="pokemon-center" id="pokemonCenter">
        <img id="pokemonImg" src="" alt="">
    </div>

    
    <div class="status-enemy" id="statusEnemy">
        <div class="status-enemy-inner">
            <span class="poke-name" id="pokeName">---</span>
            <button class="btn-desfav" id="btnDesfav" title="Remover dos favoritos">
                <img src="img/favorite-icon-button.png" alt="Favorito">
            </button>
        </div>
        <div class="poke-types" id="pokeTypes"></div>
    </div>

    
    <button class="carousel-btn prev" onclick="pokeAnterior()">&#9664;</button>
    <button class="carousel-btn next" onclick="pokeProximo()">&#9654;</button>

    
    <div class="poke-dots" id="pokeDots"></div>

</div>

<div class="stats-bottom">
    <div class="dialog-text" id="dialogText">Escolha um pokémon!</div>

    <div class="stat-card-vertical">
        <div class="stat-nav">
            <button onclick="statAnterior()">&#9664;</button>
            <span class="stat-label-name" id="statLabel">HP</span>
            <button onclick="statProximo()">&#9654;</button>
        </div>
        <div class="stat-value-big" id="statValue">---</div>
        <div class="stat-bar-track">
            <div class="stat-bar-fill" id="statBar" style="width:0%"></div>
        </div>
        <div class="stat-dots" id="statDots"></div>
    </div>
</div>

<script src="favoritos.js"></script>
    
    <div class="login-overlay" id="overlayLogin">
        <div class="login-card">
            <div class="login-titlebar">
                <button class="login-titlebar-close" onclick="fecharLogin()">&#10005;</button>
                <span class="login-titlebar-title">Login</span>
            </div>
            <div class="login-body">
                <div class="login-avatar">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                        stroke="#1a4a8a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="7" r="4"/>
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    </svg>
                </div>
                <div class="login-fields">
                    <div class="login-field">
                        <span class="login-field-label">Usuário</span>
                        <input type="text" id="inputUser" placeholder="Digite seu usuário"
                            onkeydown="if(event.key==='Enter') fazerLogin()">
                    </div>
                </div>
                <p class="login-error" id="loginError"></p>
                <div class="login-buttons">
                    <button class="login-btn login-btn-primary" onclick="fazerLogin()">ENTRAR</button>
                    <button class="login-btn" onclick="abrirRegister()">REGISTRAR</button>
                </div>
            </div>
            <div class="login-gameboy-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    
    <div class="login-overlay" id="overlayRegister">
        <div class="login-card">
            <div class="login-titlebar">
                <button class="login-titlebar-close" onclick="fecharRegister()">&#10005;</button>
                <span class="login-titlebar-title">Cadastro</span>
            </div>
            <div class="login-body">
                <div class="login-avatar">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                        stroke="#1a4a8a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="7" r="4"/>
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    </svg>
                </div>
                <div class="login-fields">
                    <div class="login-field">
                        <span class="login-field-label">Nome</span>
                        <input type="text" id="regNome" placeholder="Seu nome completo">
                    </div>
                    <div class="login-field">
                        <span class="login-field-label">Usuário</span>
                        <input type="text" id="regUser" placeholder="Escolha um usuário">
                    </div>
                </div>
                <p class="login-error" id="registerError"></p>
                <div class="login-buttons">
                    <button class="login-btn login-btn-primary" onclick="fazerCadastro()">CRIAR</button>
                    <button class="login-btn" onclick="fecharRegister(); abrirLogin()">VOLTAR</button>
                </div>
            </div>
            <div class="login-gameboy-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
